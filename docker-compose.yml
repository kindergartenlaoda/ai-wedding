version: "3.8"

services:
  # ============================================================
  # PostgreSQL 数据库
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: ai-wedding-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aiwedding}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiwedding123}
      POSTGRES_DB: ${POSTGRES_DB:-ai_wedding}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiwedding}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-wedding

  # ============================================================
  # MinIO 对象存储
  #
  # 启用方式：
  #   使用 MinIO：docker compose --profile with-minio up -d
  #   不使用（用阿里云 OSS）：docker compose up -d
  #
  # 管理后台：http://localhost:9001
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: ai-wedding-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - with-minio
    networks:
      - ai-wedding

  # ============================================================
  # MinIO 初始化（自动创建 bucket 并设置公开读取策略）
  # ============================================================
  minio-init:
    image: minio/mc:latest
    container_name: ai-wedding-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ACCESS_KEY:-minioadmin} $${MINIO_SECRET_KEY:-minioadmin};
      mc mb myminio/$${MINIO_BUCKET_NAME:-ai-images} --ignore-existing;
      mc anonymous set download myminio/$${MINIO_BUCKET_NAME:-ai-images};
      echo 'MinIO bucket initialized';
      "
    profiles:
      - with-minio
    networks:
      - ai-wedding

  # ============================================================
  # AI Wedding 应用
  #
  # 启动时自动执行：
  #   1. 等待 PostgreSQL 就绪
  #   2. Prisma migrate deploy
  #   3. 数据库 seed（管理员、领域、模板、模型配置）
  #   4. 启动 Next.js
  # ============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-wedding-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-aiwedding}:${POSTGRES_PASSWORD:-aiwedding123}@postgres:5432/${POSTGRES_DB:-ai_wedding}
      MINIO_INTERNAL_ENDPOINT: http://minio:9000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ai-wedding

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

networks:
  ai-wedding:
    driver: bridge
