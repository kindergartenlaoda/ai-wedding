version: "3.8"

services:
  # ============================================================
  # PostgreSQL 数据库
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: ai-wedding-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aiwedding}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiwedding123}
      POSTGRES_DB: ${POSTGRES_DB:-ai_wedding}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiwedding}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # MinIO 对象存储（可选，用于图片存储）
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: ai-wedding-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - with-minio

  # ============================================================
  # AI Wedding 应用
  # ============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-wedding-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-aiwedding}:${POSTGRES_PASSWORD:-aiwedding123}@postgres:5432/${POSTGRES_DB:-ai_wedding}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
